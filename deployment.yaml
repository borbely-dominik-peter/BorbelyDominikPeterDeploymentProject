apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx-pod
          image: ghcr.io/borbely-dominik-peter/ghaction-k8s-13a-proj-fr:1773761843
          ports:
            - containerPort: 80
          env:
            - name: PMA_HOST
              value: mariadb-test-cluster-ip-service  # Updated to use the service name

---

apiVersion: v1
kind: Service
metadata:
  name: nginx-test-cluster-ip-service
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - protocol: TCP
      targetPort: 80
      port: 80

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-test-ingress
  # annotations:
    # nginx.ingress.kubernetes.io/whitelist-source-range: 10.0.23.0/24 # ip range filter, example locks to room 203

spec:
  ingressClassName: nginx

  rules:
    - host: nginx-test-borbelydominikpeter.jcloud.jedlik.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-test-cluster-ip-service
                port:
                  number: 80
    - host: laravel-test-borbelydominikpeter.jcloud.jedlik.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laravel-test-cluster-ip-service
                port:
                  number: 80 

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laravel
  template:
    metadata:
      labels:
        app: laravel
    spec:
      containers:
        - name: laravel-pod
          image: ghcr.io/borbely-dominik-peter/ghaction-k8s-13a-proj-ba:1773761843
          ports:
            - containerPort: 80
          env:
            - name: PMA_HOST
              value: mariadb-test-cluster-ip-service  # Updated to use the service name

---

apiVersion: v1
kind: Service
metadata:
  name: laravel-test-cluster-ip-service
spec:
  type: ClusterIP
  selector:
    app: laravel
  ports:
    - protocol: TCP
      name: a
      targetPort: 8000
      port: 80

---


